<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Từ Vựng Anime</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* CSS MẶC ĐỊNH */
        body { font-family: 'Nunito', sans-serif; margin: 0; padding: 20px; background: url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed; background-size: cover; min-height: 100vh; color: #4a4a4a; }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-radius: 20px; padding: 25px; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15); }
        .tab-menu { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .tab-menu button { padding: 12px 25px; cursor: pointer; background: rgba(255,255,255,0.7); border: none; border-radius: 30px; font-weight: 600; font-size: 16px; transition: 0.3s; }
        .tab-menu button.active { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #4a4a4a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: rgba(168, 237, 234, 0.5); font-weight: 800; }
        
        .btn { padding: 8px 15px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-success { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }
        .btn-info { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); color: #333; }
        .btn-warning { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
        .btn-danger { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        
        /* Modal Style */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 1000; }
        .modal-box { background: white; margin: 5% auto; padding: 30px; border-radius: 20px; width: 450px; position: relative; max-height: 85vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .form-group input, .form-group textarea { padding: 10px; border: 1px solid #ccc; border-radius: 10px; font-family: 'Nunito'; outline: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: #a8edea; }
        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: #aaa; }

        .detail-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .detail-table th { background: #f0f0f0; width: 35%; text-align: right; padding-right: 15px; color: #666; border-radius: 10px 0 0 10px; }
        .detail-table td { background: #fafafa; font-weight: 600; color: #333; border-radius: 0 10px 10px 0;}

        /* --- CSS CHO MENU GAME --- */
        .game-menu-card {
            background: rgba(255, 255, 255, 0.9); border: 2px dashed #ffb6c1; border-radius: 20px; padding: 30px;
            text-align: center; cursor: pointer; transition: 0.3s; margin: 10px; display: inline-block; width: 220px;
        }
        .game-menu-card:hover { transform: translateY(-5px); background: #fff; box-shadow: 0 10px 20px rgba(255, 182, 193, 0.4); border-style: solid; }

        /* --- NÚT GAME & PHÂN BIỆT MÀU SẮC TỪ/NGHĨA --- */
        #gameBoard { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 20px; }
        
        .card { 
            border: 2px solid #eee; border-radius: 15px; padding: 20px 10px; text-align: center; 
            font-weight: 800; cursor: pointer; transition: 0.3s; user-select: none;
        }

        /* Màu thẻ Từ Tiếng Anh (Xanh dương nhạt) */
        .card.type-word { background: #f0f4ff; border-color: #d2e3fc; color: #4a4a4a; }
        .card.type-word:hover { border-color: #a1c4fd; box-shadow: 0 4px 10px rgba(161, 196, 253, 0.3); }

        /* Màu thẻ Nghĩa Tiếng Việt (Hồng đào nhạt) */
        .card.type-mean { background: #fff0f5; border-color: #fce4ec; color: #4a4a4a; }
        .card.type-mean:hover { border-color: #ffb6c1; box-shadow: 0 4px 10px rgba(255, 182, 193, 0.3); }

        /* Trạng thái Click, Đúng, Sai (Ghi đè màu mặc định) */
        .card.selected { background: #2d3436; color: white; border-color: #2d3436; transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .card.correct { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); color: #fff; border-color: #84fab0; transform: scale(0.95); pointer-events: none; }
        .card.wrong { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: white; border-color: #ff9a9e; animation: shake 0.4s ease; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-5px); } 50% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.3);">✨ THẾ GIỚI CỦA DIỆP ✨</h1>

    <div class="tab-menu">
        <button class="tab-links active" onclick="openTab(event, 'tab1')"><i class="fas fa-book-open"></i> Sổ tay</button>
        <button class="tab-links" onclick="openTab(event, 'tab2')"><i class="fas fa-gamepad"></i> Phòng Luyện Tập</button>
    </div>

    <div id="tab1" class="tab-content active glass-panel">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center;">
            <h2 style="margin:0; color: #6c5ce7;"><i class="fas fa-list-ul"></i> Danh Sách Từ Vựng</h2>
            <button class="btn btn-success" onclick="openAddModal()"><i class="fas fa-plus"></i> Thêm từ mới</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Từ vựng</th>
                    <th>Dạng từ</th>
                    <th>Nghĩa</th>
                    <th style="text-align: center; width: 180px;">Hành động</th>
                </tr>
            </thead>
            <tbody id="wordTableBody"></tbody>
        </table>
    </div>

    <div id="tab2" class="tab-content glass-panel">
        
        <div id="gameMenuScreen" style="text-align: center;">
            <h2 style="color: #6c5ce7; margin-bottom: 30px;"><i class="fas fa-shapes"></i> Chọn trò chơi để bắt đầu</h2>
            
            <div class="game-menu-card" onclick="openGame('diepthui')">
                <i class="fas fa-heart" style="font-size: 50px; color: #ff7675; margin-bottom: 15px;"></i>
                <h3 style="margin: 10px 0; color: #2d3436;">Diệp thúi đáng géc 🌸</h3>
                <p style="color: #636e72; font-size: 14px; margin-bottom: 0;">Ghép cặp từ vựng và nghĩa tiếng Việt</p>
            </div>
        </div>

        <div id="gamePlayScreen" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #eee; padding-bottom: 15px; margin-bottom: 15px;">
                <button class="btn btn-warning" onclick="backToGameMenu()"><i class="fas fa-arrow-left"></i> Quay lại</button>
                <h2 id="gameTitle" style="margin: 0; color: #ff7675;">🌸 Diệp thúi đáng géc 🌸</h2>
                <button class="btn btn-info" onclick="startMatchingGame()"><i class="fas fa-sync-alt"></i> Làm mới</button>
            </div>
            <div style="text-align: center; margin-bottom: 15px; font-size: 14px; color: #888;">
                <span style="display:inline-block; width: 15px; height: 15px; background: #f0f4ff; border: 1px solid #d2e3fc; border-radius: 3px; vertical-align: middle; margin-right: 5px;"></span> Tiếng Anh 
                <span style="display:inline-block; width: 15px; height: 15px; background: #fff0f5; border: 1px solid #fce4ec; border-radius: 3px; vertical-align: middle; margin-left: 15px; margin-right: 5px;"></span> Tiếng Việt
            </div>
            <div id="gameBoard"></div>
        </div>

    </div>

    <div id="detailModal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-btn" onclick="closeModal('detailModal')">&times;</span>
            <h3 style="color: #a1c4fd; text-align: center; font-size: 24px; margin-top: 0;"><i class="fas fa-search"></i> Chi Tiết Từ Vựng</h3>
            <table class="detail-table">
                <tr><th>ID</th><td id="detId"></td></tr>
                <tr><th>Từ vựng</th><td id="detWord" style="color: #6c5ce7; font-size: 18px;"></td></tr>
                <tr><th>Phát âm</th><td id="detPronun" style="color: #e84393;"></td></tr>
                <tr><th>Dạng từ</th><td id="detPart"></td></tr>
                <tr><th>Nghĩa VN</th><td id="detMean"></td></tr>
                <tr><th>Ví dụ</th><td id="detExample" style="font-style: italic; color: #555;"></td></tr>
            </table>
        </div>
    </div>

    <div id="actionModal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-btn" onclick="closeModal('actionModal')">&times;</span>
            <h3 id="modalTitle" style="color: #ff8da1; text-align: center;">✨ Thêm Từ Mới ✨</h3>
            <div class="form-group"><label>Từ tiếng Anh (*):</label><input type="text" id="inpWord"></div>
            <div class="form-group"><label>Cách phát âm:</label><input type="text" id="inpPronun" placeholder="Ví dụ: /həˈləʊ/"></div>
            <div class="form-group"><label>Dạng từ (*):</label><input type="text" id="inpPart"></div>
            <div class="form-group"><label>Nghĩa tiếng Việt (*):</label><input type="text" id="inpMean"></div>
            <div class="form-group"><label>Ví dụ minh họa:</label><textarea id="inpExample" rows="3" placeholder="Nhập câu ví dụ..."></textarea></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-success" id="btnSave" onclick="saveWord()">Lưu Lại</button>
            </div>
        </div>
    </div>

    <script>
        // --- LOGIC GIAO DIỆN CHUNG ---
        let currentWords = [];
        let editingId = null;

        function openTab(evt, tabName) {
            document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
            document.querySelectorAll(".tab-links").forEach(el => el.classList.remove("active"));
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- GỌI API (TAB 1) ---
        async function loadWords() {
            try {
                const res = await fetch('/api/words');
                currentWords = await res.json();
                const tbody = document.getElementById('wordTableBody');
                tbody.innerHTML = '';
                currentWords.forEach(w => {
                    tbody.innerHTML += `
                        <tr>
                            <td><b>${w.id}</b></td>
                            <td style="color: #6c5ce7; font-weight: bold; font-size: 18px;">${w.word}</td>
                            <td><em>${w.part_of_speech}</em></td>
                            <td>${w.mean}</td>
                            <td style="text-align: center;">
                                <button class="btn btn-info" onclick="showDetails(${w.id})" title="Xem chi tiết"><i class="fas fa-eye"></i></button>
                                <button class="btn btn-warning" onclick="openEditModal(${w.id})" title="Sửa"><i class="fas fa-pen"></i></button>
                                <button class="btn btn-danger" onclick="deleteWord(${w.id})" title="Xóa"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) { console.error("Lỗi tải dữ liệu", err); }
        }

        function showDetails(id) {
            const word = currentWords.find(w => w.id === id);
            if(word) {
                document.getElementById('detId').innerText = word.id;
                document.getElementById('detWord').innerText = word.word;
                document.getElementById('detPronun').innerText = word.pronunciation || '(Chưa có)';
                document.getElementById('detPart').innerText = word.part_of_speech;
                document.getElementById('detMean').innerText = word.mean;
                document.getElementById('detExample').innerText = word.examples || '(Chưa có)';
                document.getElementById('detailModal').style.display = 'block';
            }
        }

        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').innerText = '✨ Thêm Từ Mới ✨';
            document.getElementById('inpWord').value = '';
            document.getElementById('inpPronun').value = '';
            document.getElementById('inpPart').value = '';
            document.getElementById('inpMean').value = '';
            document.getElementById('inpExample').value = '';
            document.getElementById('actionModal').style.display = 'block';
        }

        function openEditModal(id) {
            editingId = id;
            const word = currentWords.find(w => w.id === id);
            if(word) {
                document.getElementById('modalTitle').innerText = '🛠 Sửa Từ Vựng';
                document.getElementById('inpWord').value = word.word;
                document.getElementById('inpPronun').value = word.pronunciation || '';
                document.getElementById('inpPart').value = word.part_of_speech;
                document.getElementById('inpMean').value = word.mean;
                document.getElementById('inpExample').value = word.examples || '';
                document.getElementById('actionModal').style.display = 'block';
            }
        }

        async function saveWord() {
            const data = {
                word: document.getElementById('inpWord').value,
                pronunciation: document.getElementById('inpPronun').value,
                part_of_speech: document.getElementById('inpPart').value,
                mean: document.getElementById('inpMean').value,
                examples: document.getElementById('inpExample').value
            };
            if(!data.word || !data.part_of_speech || !data.mean) return alert("Vui lòng điền các ô có dấu (*)");
            const method = editingId ? 'PUT' : 'POST';
            const url = editingId ? `/api/words/${editingId}` : '/api/add-word';
            await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            closeModal('actionModal');
            loadWords();
        }

        async function deleteWord(id) {
            if(confirm("Bạn có chắc muốn xóa từ này?")) {
                await fetch(`/api/words/${id}`, { method: 'DELETE' });
                loadWords();
            }
        }

        // --- LOGIC CHUYỂN MÀN HÌNH GAME ---
        function openGame(gameType) {
            document.getElementById('gameMenuScreen').style.display = 'none';
            document.getElementById('gamePlayScreen').style.display = 'block';
            document.getElementById('gameBoard').innerHTML = '<p style="text-align:center; width: 100%;">Đang niệm phép lấy từ vựng...</p>';
            if (gameType === 'diepthui') {
                document.getElementById('gameTitle').innerHTML = '🌸 Diệp thúi đáng géc 🌸';
                startMatchingGame();
            }
        }

        function backToGameMenu() {
            document.getElementById('gameMenuScreen').style.display = 'block';
            document.getElementById('gamePlayScreen').style.display = 'none';
            selectedCards = [];
            canClick = true;
        }

        // --- GAME DIỆP THÚI CÓ PHÂN BIỆT MÀU ---
        let selectedCards = [], canClick = true;
        async function startMatchingGame() {
            document.getElementById('gameBoard').innerHTML = '<p style="text-align:center; width: 100%;">Đang xào bài...</p>';
            selectedCards = [];
            canClick = true;

            const res = await fetch('/api/words');
            const data = await res.json();
            if (data.length < 2) {
                document.getElementById('gameBoard').innerHTML = '<p style="text-align:center; width: 100%; color: red;">Cần ít nhất 2 từ vựng để chơi!</p>';
                return;
            }

            const picked = data.sort(() => 0.5 - Math.random()).slice(0, 30);
            let gameData = [];
            
            // Gắn thêm thuộc tính type để phân biệt màu sắc
            picked.forEach(w => {
                gameData.push({ id: w.id, text: w.word, type: 'type-word' });
                gameData.push({ id: w.id, text: w.mean, type: 'type-mean' });
            });
            
            gameData.sort(() => 0.5 - Math.random());

            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            gameData.forEach(item => {
                const card = document.createElement('div');
                // Nạp class CSS tương ứng (xanh cho từ, hồng cho nghĩa)
                card.className = `card ${item.type}`;
                card.innerText = item.text;
                card.onclick = () => handleCardClick(card, item.id, item.type);
                board.appendChild(card);
            });
        }

        function handleCardClick(card, id, baseClass) {
            if (!canClick || card.classList.contains('correct')) return;
            
            // Hủy chọn
            if (card.classList.contains('selected')) { 
                card.className = `card ${baseClass}`; // Trả về màu gốc
                selectedCards = []; 
                return; 
            }
            
            card.className = `card ${baseClass} selected`; // Giữ màu gốc, thêm hiệu ứng đen
            selectedCards.push({ card, id, baseClass });

            if (selectedCards.length === 2) {
                canClick = false;
                const [c1, c2] = selectedCards;
                if (c1.id === c2.id) {
                    // Đúng -> Xóa mọi class cũ, chèn class correct
                    c1.card.className = 'card correct'; 
                    c2.card.className = 'card correct';
                    selectedCards = []; canClick = true;
                } else {
                    // Sai -> Chèn class wrong
                    c1.card.classList.add('wrong'); 
                    c2.card.classList.add('wrong');
                    setTimeout(() => {
                        // Hết 1s trả lại class gốc
                        c1.card.className = `card ${c1.baseClass}`; 
                        c2.card.className = `card ${c2.baseClass}`;
                        selectedCards = []; canClick = true;
                    }, 1000);
                }
            }
        }

        loadWords();
    </script>
</body>
</html>
